<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="55%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#141427"/>
    </linearGradient>
    <linearGradient id="glowA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a7cff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00ffd5" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tinyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="1320" cy="170" r="180" fill="#8a7cff" opacity="0.16" filter="url(#softGlow)"/>
  <circle cx="250" cy="760" r="220" fill="#00ffd5" opacity="0.10" filter="url(#softGlow)"/>
  <circle cx="1200" cy="760" r="130" fill="#00ffd5" opacity="0.08" filter="url(#softGlow)"/>

  <g opacity="0.16">
    <rect x="80" y="80" width="1440" height="740" rx="36" fill="none" stroke="#ffffff" stroke-opacity="0.11"/>
    <rect x="110" y="110" width="1380" height="680" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>

  <g transform="translate(145,175)">
    <rect x="0" y="0" width="170" height="170" rx="34" fill="#0b0b12" stroke="#1d1d2d" stroke-width="2"/>
    <rect x="0" y="0" width="170" height="170" rx="34" fill="url(#glowA)" opacity="0.06"/>
    <path d="M55 52L28 85L55 118" stroke="#00ffd5" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#tinyGlow)"/>
    <path d="M115 52L142 85L115 118" stroke="#8a7cff" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#tinyGlow)"/>
  </g>

  <text x="350" y="390" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="900" fill="#f7f7fb" letter-spacing="1">RE<tspan fill="#00ffd5">.</tspan>FRAME</text>

  <text x="350" y="500" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800" fill="#ffffff">Let's get started with Reframe</text>

  <text x="350" y="575" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="500" fill="#c9cad7">A quick tour of the workspace, core tools, and the fastest way to get value.</text>

  <g transform="translate(350,655)">
    <rect x="0" y="0" width="300" height="72" rx="20" fill="#0f1018" stroke="#23243a" stroke-width="2"/>
    <circle cx="38" cy="36" r="8" fill="#00ffd5"/>
    <text x="64" y="46" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#eff0f7">Projects</text>

    <rect x="332" y="0" width="300" height="72" rx="20" fill="#0f1018" stroke="#23243a" stroke-width="2"/>
    <circle cx="370" cy="36" r="8" fill="#8a7cff"/>
    <text x="396" y="46" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#eff0f7">AI Studio</text>

    <rect x="664" y="0" width="420" height="72" rx="20" fill="#0f1018" stroke="#23243a" stroke-width="2"/>
    <circle cx="702" cy="36" r="8" fill="#00ffd5"/>
    <text x="728" y="46" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#eff0f7">Export and Publish</text>
  </g>

  <text x="145" y="835" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#8f92a8" letter-spacing="2">REFRAME</text>
</svg>
