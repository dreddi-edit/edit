name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Server Dependencies
        run: npm --prefix server ci

      - name: Install Dashboard Dependencies
        run: npm --prefix dashboard ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm run test

      - name: Smoke E2E
        run: npm run smoke
