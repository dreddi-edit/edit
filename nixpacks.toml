[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install",
  "cd server && npm install",
  "cd dashboard && npm install"
]

[phases.build]
cmds = [
  "cd dashboard && npm run build"
]

[start]
cmd = "cd server && node index.js"

[variables]
NODE_ENV = "production"
PORT = "8787"

[deploy]
volumes = ["/app/server"]
